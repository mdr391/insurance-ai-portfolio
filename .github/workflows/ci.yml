name: Portfolio CI — All Projects

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Claims Triage Agent ─────────────────────────────────────────────────────
  test-claims-triage:
    name: Claims Triage Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claims-triage-agent/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: claims-triage-agent/backend/requirements.txt

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --junitxml=results.xml

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: claims-triage-results
          path: claims-triage-agent/backend/results.xml

  # ── Underwriting Copilot ────────────────────────────────────────────────────
  test-uw-copilot:
    name: Underwriting Copilot Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uw-copilot/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: uw-copilot/backend/requirements.txt

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --junitxml=results.xml

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uw-copilot-results
          path: uw-copilot/backend/results.xml

  # ── AI Gateway ──────────────────────────────────────────────────────────────
  test-ai-gateway:
    name: AI Gateway Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-gateway/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-gateway/backend/requirements.txt

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --junitxml=results.xml

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-gateway-results
          path: ai-gateway/backend/results.xml

  # ── LLM Eval Framework ──────────────────────────────────────────────────────
  test-eval-framework:
    name: Eval Framework Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-eval-framework/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: llm-eval-framework/backend/requirements.txt

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --junitxml=results.xml

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-framework-results
          path: llm-eval-framework/backend/results.xml

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Portfolio Test Summary
    runs-on: ubuntu-latest
    needs: [test-claims-triage, test-uw-copilot, test-ai-gateway, test-eval-framework]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Claims Triage:   ${{ needs.test-claims-triage.result }}"
          echo "UW Copilot:      ${{ needs.test-uw-copilot.result }}"
          echo "AI Gateway:      ${{ needs.test-ai-gateway.result }}"
          echo "Eval Framework:  ${{ needs.test-eval-framework.result }}"

          if [[ "${{ needs.test-claims-triage.result }}"  == "success" ]] && \
             [[ "${{ needs.test-uw-copilot.result }}"     == "success" ]] && \
             [[ "${{ needs.test-ai-gateway.result }}"     == "success" ]] && \
             [[ "${{ needs.test-eval-framework.result }}" == "success" ]]; then
            echo "✅ All portfolio tests passed"
          else
            echo "❌ One or more projects failed"
            exit 1
          fi
